# /etc/nginx/sites-available/moti.com.al
# Pas krijimit: sudo ln -s /etc/nginx/sites-available/moti.com.al /etc/nginx/sites-enabled/
# Testo: sudo nginx -t   |   Rifresko: sudo systemctl reload nginx
# TLS-in e shton automatikisht certbot (shih DEPLOY.md).

server {
    listen 80;
    listen [::]:80;
    server_name moti.com.al www.moti.com.al;

    # Rrënja ku ndodhet build-i i frontend-it (dist/)
    root /var/www/moti.com.al/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # ─── API → backend-i Node (127.0.0.1:8080) ───────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── Asetet statike me cache të gjatë ─────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── SPA fallback: çdo rrugë tjetër → index.html (React Router) ───────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
